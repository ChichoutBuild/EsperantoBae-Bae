<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil - Esperanto Bae Bae</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #7953B5;
      color: #251735;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 26px;
    }

    .header,
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(40, 20, 70, 0.24);
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.35);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 10px;
      color: #4b2d78;
      font-size: 34px;
    }

    h2 {
      margin-top: 0;
      color: #4b2d78;
    }

    .subtitle,
    .muted {
      color: #6d5a89;
      line-height: 1.6;
    }

    .logout-btn,
    .course-btn {
      border: none;
      border-radius: 14px;
      padding: 11px 16px;
      background: #5c3d93;
      color: white;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      display: inline-block;
    }

    .course-btn.locked {
      background: #b7abc9;
      pointer-events: none;
      cursor: not-allowed;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-box {
      background: linear-gradient(135deg, #f7f2ff, #f1e9ff);
      border: 1px solid #e2d5f7;
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box strong {
      display: block;
      margin-bottom: 10px;
      color: #49306f;
    }

    .progress-wrap {
      background: #ddd0f1;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 8px;
    }

    .progress-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .mine {
      background: linear-gradient(90deg, #8c6bc7, #5c3d93);
      width: 0%;
    }

    .other {
      background: linear-gradient(90deg, #d38db4, #9b5d86);
      width: 0%;
    }

    .courses {
      display: grid;
      gap: 16px;
    }

    .course-card {
      border: 1px solid #e2d5f7;
      border-radius: 20px;
      padding: 18px;
      background: linear-gradient(135deg, #f6f0ff, #efe6ff);
    }

    .course-card.locked {
      background: linear-gradient(135deg, #f1edf7, #ece7f3);
      opacity: 0.95;
    }

    .course-card h3 {
      margin: 0 0 8px;
      color: #4a2f77;
      font-size: 20px;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      margin-right: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: white;
      font-size: 12px;
      border: 1px solid #d7caee;
      color: #4c3a69;
    }

    .success {
      background: #e6d7ff;
    }

    .warning {
      background: #ffe4f2;
    }

    .button-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .note-box {
      margin-top: 18px;
      background: linear-gradient(135deg, #f8f4ff, #f1e8ff);
      border: 1px solid #e2d5f7;
      border-radius: 18px;
      padding: 16px;
      color: #5d4b79;
      line-height: 1.6;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <div>
          <h1>Esperanto Bae Bae</h1>
          <p id="welcome" class="subtitle"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Se déconnecter</button>
      </div>
      <div class="note-box">
        Avancez ensemble : un nouveau cours ne se débloque que lorsque vous avez tous les deux validé le précédent.
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2>Votre progression</h2>

        <div class="stats">
          <div class="stat-box">
            <strong>Ta progression</strong>
            <div class="progress-wrap"><div class="progress-bar mine" id="myBar"></div></div>
            <div id="myText" class="muted">0% complété</div>
            <div id="myMeta" class="muted"></div>
          </div>

          <div class="stat-box">
            <strong>Progression de l'autre</strong>
            <div class="progress-wrap"><div class="progress-bar other" id="otherBar"></div></div>
            <div id="otherText" class="muted">0% complété</div>
            <div id="otherMeta" class="muted"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Les cours</h2>
        <div class="courses" id="coursesList"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const courses = [
      {
        id: "salutations",
        title: "Salutations",
        file: "salutations.html",
        description: "Bonjour, merci, oui, non, et les premiers mots."
      },
      {
        id: "bases",
        title: "Bases",
        file: "bases.html",
        description: "Mi estas, amour, mots simples."
      },
      {
        id: "pronoms",
        title: "Pronoms et personnes",
        file: "pronoms.html",
        description: "Je, tu, il, elle, nous, eux : parler de soi et des autres."
      },
      {
        id: "verbes",
        title: "Verbes du quotidien",
        file: "verbes.html",
        description: "Être, avoir, faire, aller, voir, vouloir, aimer."
      }
    ];

    let me = null;
    let myProgress = null;
    let allUsers = [];

    function percentToGlobal(progress) {
      const validated =
        (Number(progress.salutations_percent || 0) >= 80 ? 1 : 0) +
        (Number(progress.bases_percent || 0) >= 80 ? 1 : 0) +
        (Number(progress.pronoms_percent || 0) >= 80 ? 1 : 0) +
        (Number(progress.verbes_percent || 0) >= 80 ? 1 : 0);
      return Math.round((validated / courses.length) * 100);
    }

    function getCoursePercent(progress, courseId) {
      return Number(progress[courseId + "_percent"] || 0);
    }

    function isCourseValidatedForUser(progress, courseId) {
      return getCoursePercent(progress, courseId) >= 80;
    }

    function isCourseValidatedForEveryone(courseId) {
      if (!allUsers.length) return false;
      return allUsers.every(user => isCourseValidatedForUser(user, courseId));
    }

    function renderCourses() {
      const list = document.getElementById("coursesList");
      list.innerHTML = "";

      courses.forEach((course, index) => {
        const unlocked = index === 0 || isCourseValidatedForEveryone(courses[index - 1].id);
        const myPercent = getCoursePercent(myProgress, course.id);

        const card = document.createElement("div");
        card.className = "course-card" + (unlocked ? "" : " locked");

        let tags = "";
        if (myPercent >= 80) {
          tags += `<span class="tag success">Validé - ${myPercent}%</span>`;
        } else if (myPercent > 0) {
          tags += `<span class="tag warning">Non validé - ${myPercent}%</span>`;
        }

        if (!unlocked) {
          tags += `<span class="tag">Bloqué</span>`;
        }

        const blockMessage = !unlocked
          ? `<p class="muted">Le cours se débloquera quand vous aurez tous les deux validé "${courses[index - 1].title}" à 80% minimum.</p>`
          : "";

        const buttonHtml = unlocked
          ? `<a class="course-btn" href="${course.file}">Commencer le cours</a>`
          : `<span class="course-btn locked">Cours bloqué</span>`;

        card.innerHTML = `
          <h3>${course.title}</h3>
          <p class="muted">${course.description}</p>
          ${tags}
          ${blockMessage}
          <div class="button-row">
            ${buttonHtml}
          </div>
        `;

        list.appendChild(card);
      });
    }

    function renderProgress() {
      const myPercent = percentToGlobal(myProgress);
      document.getElementById("myBar").style.width = myPercent + "%";
      document.getElementById("myText").textContent = myPercent + "% complété";
      document.getElementById("myMeta").textContent =
        "Niveau : " + myProgress.level + " | Score : " + myProgress.score;

      const other = allUsers.find(u => u.login_id !== me.login_id);
      if (other) {
        const otherPercent = percentToGlobal(other);
        document.getElementById("otherBar").style.width = otherPercent + "%";
        document.getElementById("otherText").textContent = otherPercent + "% complété";
        document.getElementById("otherMeta").textContent =
          "Niveau : " + other.level + " | Score : " + other.score;
      }
    }

    (async function init() {
      const session = await requireAuth();
      if (!session) return;

      me = session;
      document.getElementById("welcome").textContent =
        "Connecté en tant que " + session.display_name;

      const res1 = await apiPost({
        action: "getProgress",
        token: session.token
      });

      const res2 = await apiPost({
        action: "getAllProgress",
        token: session.token
      });

      if (!res1.ok) {
        clearSession();
        window.location.href = "index.html";
        return;
      }

      myProgress = res1.progress;
      allUsers = res2.ok ? res2.users : [];

      renderCourses();
      renderProgress();
    })();
  </script>
</body>
</html>
