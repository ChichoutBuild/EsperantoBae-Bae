<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://TON_PROJECT_ID.supabase.co";
const SUPABASE_ANON_KEY = "TA_CLE_ANON_PUBLIC";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const LOGIN_MAP = {
  sacha: "sacha@baebae.local",
  lea: "leacaca@baebae.local"
};

const courses = [
  {
    id: "salutations",
    title: "Salutations",
    file: "salutations.html",
    description: "Bonjour, merci, oui, non, et les premiers mots pour commencer à discuter en esperanto.",
    exercises: 8
  },
  {
    id: "bases",
    title: "Bases",
    file: "bases.html",
    description: "Les premières structures utiles comme “Mi estas…”, du vocabulaire courant et des mots simples.",
    exercises: 8
  }
];

let currentUser = null;
let currentProfile = null;

function setAuthMessage(message) {
  document.getElementById("authMessage").textContent = message;
}

function getEmailFromLogin(loginId) {
  return LOGIN_MAP[loginId] || null;
}

async function signIn() {

  const loginId = document.getElementById("loginId").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const email = getEmailFromLogin(loginId) || loginId;

  if (!email || !password) {
    setAuthMessage("Entre ton identifiant ou email et ton mot de passe.");
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    setAuthMessage("Identifiant ou mot de passe incorrect.");
    return;
  }

  await initAuth();
}

async function signOut() {

  await supabase.auth.signOut();

  currentUser = null;
  currentProfile = null;

  setAuthMessage("Déconnecté.");

  renderCourses();
  renderProgress();
}

async function ensureProfile() {

  const { data: userData } = await supabase.auth.getUser();
  const user = userData?.user;

  if (!user) return;

  const { data: existing } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (!existing) {

    await supabase.from("profiles").insert({
      id: user.id,
      email: user.email
    });

  }
}

async function loadProfile() {

  if (!currentUser) {
    currentProfile = null;
    renderCourses();
    renderProgress();
    return;
  }

  const { data, error } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if (error) {
    currentProfile = null;
  } else {
    currentProfile = data;
  }

  renderCourses();
  renderProgress();
}

async function initAuth() {

  const { data: { session } } = await supabase.auth.getSession();

  if (session && session.user) {

    currentUser = session.user;

    await ensureProfile();

    await loadProfile();

    const displayId =
      currentUser.email === "sacha@baebae.local" ? "sacha"
      : currentUser.email === "leacaca@baebae.local" ? "lea"
      : currentUser.email;

    setAuthMessage("Connecté en tant que " + displayId);

  } else {

    currentUser = null;
    currentProfile = null;

    setAuthMessage("Non connecté.");

    renderCourses();
    renderProgress();
  }
}

function getCourseResult(courseId) {

  if (currentProfile) {

    const validated = currentProfile[courseId + "_validated"];
    const percent = currentProfile[courseId + "_percent"];

    if (validated !== undefined && percent !== undefined) {
      return {
        validated: !!validated,
        percent: percent
      };
    }
  }

  const raw = localStorage.getItem("course_" + courseId);
  return raw ? JSON.parse(raw) : null;
}

function isCourseValidated(courseId) {

  const result = getCourseResult(courseId);
  return !!(result && result.validated === true);
}

function renderCourses() {

  const container = document.getElementById("coursesList");

  container.innerHTML = "";

  courses.forEach((course, index) => {

    const previousCourse = courses[index - 1];

    const unlocked =
      index === 0 || isCourseValidated(previousCourse.id);

    const result = getCourseResult(course.id);

    let element;

    if (unlocked) {

      element = document.createElement("a");
      element.href = course.file;
      element.className = "course-link";

    } else {

      element = document.createElement("div");
      element.className = "course-locked";

    }

    let tags = `<span class="tag">${course.exercises} exercices</span>`;

    if (result && result.validated) {

      tags += `<span class="tag success">Validé - ${result.percent}%</span>`;

    } else if (result && !result.validated && result.percent > 0) {

      tags += `<span class="tag warning">Non validé - ${result.percent}%</span>`;

    } else if (!unlocked) {

      tags += `<span class="tag locked">Bloqué</span>`;
    }

    let lockedMessage = "";

    if (!unlocked && previousCourse) {

      lockedMessage =
        `<p class="small-note">Valide d'abord le cours "${previousCourse.title}" à 80% minimum.</p>`;
    }

    element.innerHTML = `
      <h3>${course.title}</h3>
      <p>${course.description}</p>
      ${tags}
      ${lockedMessage}
    `;

    container.appendChild(element);

  });
}

function renderProgress() {

  const validatedCount =
    courses.filter(course => isCourseValidated(course.id)).length;

  const percent =
    Math.round((validatedCount / courses.length) * 100);

  document.getElementById("progressYouBar").style.width =
    percent + "%";

  document.getElementById("progressYouText").textContent =
    percent + "% complété";
}

function resetProgress() {

  courses.forEach(course => {

    localStorage.removeItem("course_" + course.id);

  });

  renderCourses();
  renderProgress();
}

window.resetProgress = resetProgress;

supabase.auth.onAuthStateChange(async () => {

  await initAuth();

});

initAuth();

</script>
