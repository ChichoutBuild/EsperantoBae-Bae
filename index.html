<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Esperanto Bae Bae</title>

<link rel="icon" href="data:,">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f6f7fb;
color:#1f2937;
}

.container{
max-width:1100px;
margin:auto;
padding:24px;
}

.header{
background:white;
border-radius:18px;
padding:24px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
margin-bottom:24px;
}

.layout{
display:grid;
grid-template-columns:1.1fr 0.9fr;
gap:20px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.progress-wrap{
background:#e5e7eb;
height:10px;
border-radius:999px;
overflow:hidden;
margin:8px 0 6px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
}

.courses{
display:grid;
gap:14px;
margin-top:16px;
}

.course-link,
.course-locked{
display:block;
border:1px solid #e5e7eb;
border-radius:16px;
padding:16px;
text-decoration:none;
color:inherit;
}

.course-link{
background:#eef2ff;
}

.course-locked{
background:#f3f4f6;
opacity:0.7;
}

.tag{
display:inline-block;
margin-top:10px;
padding:6px 10px;
border-radius:999px;
background:white;
font-size:12px;
border:1px solid #d1d5db;
}

.tag.success{background:#dcfce7}
.tag.warning{background:#fef3c7}
.tag.locked{background:#e5e7eb}

.auth-box{
margin-top:20px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:14px;
padding:14px;
}

.auth-input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #d1d5db;
margin-bottom:10px;
}

.auth-btn{
border:none;
border-radius:12px;
padding:10px 14px;
background:#111827;
color:white;
cursor:pointer;
margin-right:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Esperanto Bae Bae</h1>

<p>
Le site préféré de Bae et Bae pour apprendre leur langue secrète.
</p>

</div>

<div class="layout">

<div class="card">

<h2>Progression</h2>

<div class="progress-wrap">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="progressText">0% complété</p>

<div class="auth-box">

<h3>Connexion</h3>

<input id="loginId" class="auth-input" placeholder="sacha ou lea">

<input id="password" type="password" class="auth-input" placeholder="mot de passe">

<button class="auth-btn" onclick="signIn()">Se connecter</button>
<button class="auth-btn" onclick="signOut()">Se déconnecter</button>

<p id="authMessage">Non connecté</p>

</div>

</div>

<div class="card">

<h2>Cours</h2>

<div id="coursesList" class="courses"></div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://TON_PROJECT_ID.supabase.co"
const SUPABASE_KEY="TA_CLE_ANON_PUBLIC"

const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const LOGIN_MAP={
sacha:"sacha@baebae.local",
lea:"leacaca@baebae.local"
}

const courses=[

{
id:"salutations",
title:"Salutations",
file:"salutations.html",
exercises:8
},

{
id:"bases",
title:"Bases",
file:"bases.html",
exercises:8
}

]

let currentUser=null
let currentProfile=null

function setMessage(t){
document.getElementById("authMessage").textContent=t
}

function emailFromLogin(login){
return LOGIN_MAP[login]||login
}

window.signIn = async function(){

const login=document.getElementById("loginId").value.trim().toLowerCase()
const password=document.getElementById("password").value

const email=emailFromLogin(login)

const {error}=await supabase.auth.signInWithPassword({email,password})

if(error){
setMessage("connexion échouée")
return
}

initAuth()

}

window.signOut = async function(){

await supabase.auth.signOut()

currentUser=null
currentProfile=null

setMessage("déconnecté")

render()

}

async function initAuth(){

const {data:{session}}=await supabase.auth.getSession()

if(session){

currentUser=session.user

setMessage("connecté : "+currentUser.email)

await loadProfile()

}else{

setMessage("non connecté")

render()

}

}

async function loadProfile(){

const {data}=await supabase
.from("profiles")
.select("*")
.eq("id",currentUser.id)
.single()

currentProfile=data

render()

}

function courseResult(id){

if(!currentProfile) return null

return{
validated:currentProfile[id+"_validated"],
percent:currentProfile[id+"_percent"]
}

}

function validated(id){

const r=courseResult(id)

return r && r.validated

}

function render(){

renderCourses()
renderProgress()

}

function renderCourses(){

const list=document.getElementById("coursesList")

list.innerHTML=""

courses.forEach((c,i)=>{

const prev=courses[i-1]

const unlocked=i===0 || validated(prev.id)

const result=courseResult(c.id)

let el

if(unlocked){

el=document.createElement("a")
el.href=c.file
el.className="course-link"

}else{

el=document.createElement("div")
el.className="course-locked"

}

let tag=`<span class="tag">${c.exercises} exercices</span>`

if(result && result.validated){

tag+=`<span class="tag success">validé ${result.percent}%</span>`

}else if(result){

tag+=`<span class="tag warning">${result.percent}%</span>`

}else if(!unlocked){

tag+=`<span class="tag locked">bloqué</span>`

}

el.innerHTML=`

<h3>${c.title}</h3>

${tag}

`

list.appendChild(el)

})

}

function renderProgress(){

const done=courses.filter(c=>validated(c.id)).length

const percent=Math.round((done/courses.length)*100)

document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("progressText").textContent=percent+"% complété"

}

supabase.auth.onAuthStateChange(()=>{
initAuth()
})

initAuth()

</script>

</body>
</html>
