<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Esperanto Bae Bae</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    .subtitle { color: #6b7280; line-height: 1.5; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: #111827;
      color: white;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }
    #message {
      margin-top: 12px;
      color: #4b5563;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p class="subtitle">
      Connecte-toi pour accéder à votre progression.
    </p>

    <input id="login_id" type="text" placeholder="Identifiant (sacha ou lea)" />
    <input id="password" type="password" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>

    <div id="message"></div>
  </div>

  <script src="config.js"></script>
  <script>
    async function login() {
      const loginId = document.getElementById("login_id").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (!loginId || !password) {
        message.textContent = "Remplis les deux champs.";
        return;
      }

      const res = await apiPost({
        action: "login",
        login_id: loginId,
        password: password
      });

      if (!res.ok) {
        message.textContent = "Identifiant ou mot de passe incorrect.";
        return;
      }

      saveSession({
        token: res.token,
        login_id: res.user.login_id,
        display_name: res.user.display_name
      });

      window.location.href = "home.html";
    }

    (async function autoLogin() {
      const session = getSession();
      if (!session || !session.token) return;

      const res = await apiPost({
        action: "validate",
        token: session.token
      });

      if (res.ok) {
        window.location.href = "home.html";
      } else {
        clearSession();
      }
    })();
  </script>
</body>
</html>
