<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bases</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }
    .header, .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .lesson-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-top: 16px;
    }
    .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    button, .back {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      background: #111827;
      color: white;
      text-decoration: none;
    }
    .secondary { background: #e5e7eb; color: #111827; }
    .choices { display: grid; gap: 12px; margin-bottom: 20px; }
    .choice {
      border: 1px solid #d1d5db;
      background: white;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
    }
    .choice.selected { background: #111827; color: white; }
    input[type="text"] {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      margin-bottom: 20px;
    }
    .result { margin: 18px 0; padding: 16px; border-radius: 14px; }
    .good { background: #dcfce7; }
    .bad { background: #fee2e2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="back secondary" href="home.html">← Retour</a>
      <h1>Bases</h1>
      <p>Les premières structures utiles.</p>
    </div>

    <div class="card" id="app"></div>
  </div>

  <script src="config.js"></script>
  <script>
    const lesson = {
      id: "bases",
      title: "Bases",
      introText: "Mi = je, Ni = nous, Estas = suis/es/est..., Amo = amour, Feliĉa = heureux.",
      notes: ["Mi = je", "Ni = nous", "Estas = suis/es/est", "Amo = amour", "Feliĉa = heureux"],
      exercises: [
        { type: "mcq", prompt: "Que signifie Mi estas ?", choices: ["Tu es", "Je suis", "Nous sommes", "Ils sont"], answer: "Je suis", explanation: "Mi = je, estas = suis." },
        { type: "text", prompt: "Traduis 'je suis content' en esperanto simplifié", answer: "mi estas felica", explanation: "Version simplifiée : mi estas feliĉa." },
        { type: "mcq", prompt: "Quel mot veut dire amour ?", choices: ["Akvo", "Amo", "Libro", "Ne"], answer: "Amo", explanation: "Amo = amour." },
        { type: "mcq", prompt: "Que signifie Mi ?", choices: ["Je", "Tu", "Nous", "Merci"], answer: "Je", explanation: "Mi = je." },
        { type: "mcq", prompt: "Que signifie Ni ?", choices: ["Nous", "Oui", "Elle", "Merci"], answer: "Nous", explanation: "Ni = nous." },
        { type: "text", prompt: "Traduis 'Amo'", answer: "amour", explanation: "Amo = amour." },
        { type: "text", prompt: "Traduis 'je suis' en esperanto", answer: "mi estas", explanation: "Mi estas = je suis." },
        { type: "mcq", prompt: "Quel mot signifie heureux ?", choices: ["Feliĉa", "Libro", "Akvo", "Ne"], answer: "Feliĉa", explanation: "Feliĉa = heureux." }
      ]
    };

    let session = null;
    let state = {
      started: false,
      exerciseIndex: 0,
      score: 0,
      checked: false,
      selectedChoice: "",
      typedAnswer: "",
      finished: false,
      correct: false
    };

    function normalize(str) {
      return (str || "")
        .toLowerCase()
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function currentExercise() {
      return lesson.exercises[state.exerciseIndex];
    }

    async function saveCourseResult() {
      const percent = Math.round((state.score / lesson.exercises.length) * 100);

      await apiPost({
        action: "saveCourse",
        token: session.token,
        course_id: lesson.id,
        percent: String(percent)
      });

      return {
        percent,
        validated: percent >= 80
      };
    }

    function startLesson() {
      state.started = true;
      render();
    }

    function verifyAnswer() {
      const ex = currentExercise();
      const userAnswer = ex.type === "mcq" ? state.selectedChoice : state.typedAnswer;
      state.checked = true;
      state.correct = normalize(userAnswer) === normalize(ex.answer);
      if (state.correct) state.score++;
      render();
    }

    async function nextExercise() {
      if (state.exerciseIndex < lesson.exercises.length - 1) {
        state.exerciseIndex++;
        state.checked = false;
        state.selectedChoice = "";
        state.typedAnswer = "";
      } else {
        state.finished = true;
        await saveCourseResult();
      }
      render();
    }

    function resetLesson() {
      state = {
        started: false,
        exerciseIndex: 0,
        score: 0,
        checked: false,
        selectedChoice: "",
        typedAnswer: "",
        finished: false,
        correct: false
      };
      render();
    }

    function renderIntro(app) {
      app.innerHTML = `
        <h2>Mini-cours</h2>
        <p>${lesson.introText}</p>
        <div class="lesson-box">
          ${lesson.notes.map(n => `<div>${n}</div>`).join("")}
        </div>
        <div class="buttons">
          <button onclick="startLesson()">Commencer</button>
        </div>
      `;
    }

    async function renderFinished(app) {
      const result = await saveCourseResult();
      app.innerHTML = `
        <h2>${lesson.title} terminée 🎉</h2>
        <p>Score : <strong>${state.score}/${lesson.exercises.length}</strong> (${result.percent}%)</p>
        <div class="result ${result.validated ? "good" : "bad"}">
          <strong>${result.validated ? "Cours validé ✅" : "Cours non validé ❌"}</strong>
          <p>${result.validated ? "Bravo." : "Il faut 80% minimum pour valider."}</p>
        </div>
        <div class="buttons">
          <button onclick="resetLesson()">Revoir</button>
          <a class="back secondary" href="home.html">Retour accueil</a>
        </div>
      `;
    }

    function renderExercise(app) {
      const ex = currentExercise();

      let answerBlock = "";
      if (ex.type === "mcq") {
        answerBlock = `
          <div class="choices">
            ${ex.choices.map(choice => `
              <button class="choice ${state.selectedChoice === choice ? "selected" : ""}"
                onclick="selectChoice('${choice.replace(/'/g, "\\'")}')">${choice}</button>
            `).join("")}
          </div>
        `;
      } else {
        answerBlock = `
          <input
            type="text"
            value="${state.typedAnswer.replace(/"/g, "&quot;")}"
            oninput="typeAnswer(this.value)"
            ${state.checked ? "disabled" : ""}
            placeholder="Écris ta réponse"
          />
        `;
      }

      let resultBlock = "";
      if (state.checked) {
        resultBlock = `
          <div class="result ${state.correct ? "good" : "bad"}">
            <strong>${state.correct ? "Bonne réponse !" : "Pas tout à fait"}</strong>
            <p>${ex.explanation}</p>
            ${state.correct ? "" : `<p>Réponse attendue : <strong>${ex.answer}</strong></p>`}
          </div>
        `;
      }

      app.innerHTML = `
        <p>Exercice ${state.exerciseIndex + 1} sur ${lesson.exercises.length}</p>
        <h2>${ex.prompt}</h2>
        ${answerBlock}
        ${resultBlock}
        <div class="buttons">
          ${
            !state.checked
              ? `<button onclick="verifyAnswer()">Vérifier</button>`
              : `<button onclick="nextExercise()">${state.exerciseIndex < lesson.exercises.length - 1 ? "Suivant" : "Terminer"}</button>`
          }
          <button class="secondary" onclick="resetLesson()">Retour au cours</button>
        </div>
      `;
    }

    async function render() {
      const app = document.getElementById("app");
      if (!state.started) return renderIntro(app);
      if (state.finished) return renderFinished(app);
      renderExercise(app);
    }

    function selectChoice(choice) {
      if (state.checked) return;
      state.selectedChoice = choice;
      render();
    }

    function typeAnswer(value) {
      state.typedAnswer = value;
    }

    (async function init() {
      session = await requireAuth();
      if (!session) return;

      const progressRes = await apiPost({
        action: "getProgress",
        token: session.token
      });

      if (!progressRes.ok) {
        clearSession();
        window.location.href = "index.html";
        return;
      }

      if ((progressRes.progress.salutations_percent || 0) < 80) {
        window.location.href = "home.html";
        return;
      }

      render();
    })();
  </script>
</body>
</html>
